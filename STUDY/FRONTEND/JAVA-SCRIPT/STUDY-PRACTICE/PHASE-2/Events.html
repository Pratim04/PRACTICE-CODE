<body>
    <h1>Don't Click</h1>
    <input class="a" type="text" placeholder="Name:">
    <h3 id="headDevice">Select option</h3>
    <select name="" class="EL">
        <option selected disabled>Choose your device</option>
        <option value="Samsung">Samsung</option>
        <option value="Iphone">Iphone</option>
        <option value="Oppo">Oppo</option>
        <option value="Nothing">Nothing</option>
        <option value="Vivo">Vivo</option>
        <option value="IQO">IQO</option>
    </select>

    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        #main {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: #222;
            flex-direction: column;
            gap: 20px;

        }

        #btn {
            padding: 12px 22px;
            background-color: green;
            color: aliceblue;
            border-radius: 3px;
            box-shadow: #555;
            font-weight: 600;
        }

        #btn:hover {
            background-color: darkgreen;
            transform: scale(1.1);
        }

        h1 {
            color: #555;
            font-size: 10rem;
            font-weight: 300;
            user-select: none;
        }

        /* SUBMIT */
        #SubmitTask {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 5px;

        }

        /* Card */
        .card {
            max-width: 300px;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 40px;
            border: 1px solid #555;
            color: white;
        }

        .card h5 {
            margin-top: 5px;
        }

        .card p {
            font-size: 12px;
            margin-top: 10px;
        }

        .profile {
            width: 60px;
            height: 60px;
            background-color: red;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
    <!-- Charactor Changes -->
    <div id="main">
        <h1 id="CH">a</h1>

        <!-- Button Click By EVL -->
        <input type="file" id="FileInp" style="display: none;">
        <div id="btn">

        </div>
        <!-- Submit -->

        <form id="SUBFORM" action="">
            <div id="SubmitTask">

                <input type="text" class="Sbm" placeholder="Occupation">
                <input type="text" class="Sbm" placeholder="Info">
                <input type="submit" class="Sbm">
            </div>
        </form>
