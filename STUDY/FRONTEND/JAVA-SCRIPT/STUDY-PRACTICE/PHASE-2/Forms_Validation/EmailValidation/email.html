<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — Simple</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="email.css">
</head>

<body>
    <main class="card" role="main">
        <h1>Sign in to your account</h1>
        <p class="lead">Enter your email and password to continue.</p>

        <form autocomplete="off">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="text" placeholder="you@example.com"/>
                <small class="error" id="emailError"></small>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter password"/>
                <small class="error" id="passError"></small>
            </div>

            <div class="actions">
                <span class="small">Don't have an account? <a href="#" class="link">Sign up</a></span>
                <button class="submit-btn" type="submit">Sign in</button>
            </div>
        </form>

        <div id="resultMessage"></div>
    </main>
    <script src="email.js"></script>
</body>

</html>
