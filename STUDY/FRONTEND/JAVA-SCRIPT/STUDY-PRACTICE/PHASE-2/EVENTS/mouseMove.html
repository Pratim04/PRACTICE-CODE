<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            font-family: "Gilroy";
            box-sizing: border-box;
        }

        html,
        body {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #box{
            position: absolute;
            background-color: red;
            border-radius:50% ;
            height: 400px;
            width: 400px;
            transition: all cubic-bezier(0.19, 1, 0.22, 1) .2s;
        }

    </style>
</head>
<body>
    <script type="module" src="mouseMove.js"></script>
    <div id="box">

    </div>
</body>
</html>
